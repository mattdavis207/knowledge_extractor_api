<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trading Asset Analysis</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #647086;
      --line: #d9e0ec;
      --accent: #1267d8;
      --accent-soft: #e8f1ff;
      --danger: #b3261e;
      --ok: #137333;
      --shadow: 0 18px 45px rgba(22, 33, 62, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    .shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    header {
      padding: 28px 32px 22px;
      border-bottom: 1px solid var(--line);
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(1.7rem, 4vw, 2.35rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 1rem;
    }

    form {
      display: grid;
      gap: 28px;
      padding: 28px 32px 32px;
    }

    fieldset {
      min-width: 0;
      padding: 0;
      margin: 0;
      border: 0;
    }

    legend, .field-label {
      display: block;
      margin-bottom: 12px;
      font-size: 0.98rem;
      font-weight: 700;
    }

    .toolbar, .date-grid, .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .toolbar {
      justify-content: space-between;
      padding: 14px;
      background: #f8fafd;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .search {
      flex: 1 1 280px;
      min-width: 0;
    }

    .bulk-field {
      flex: 0 1 180px;
      min-width: 150px;
    }

    .bulk-field span, .asset-controls span {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    input[type="search"], input[type="date"], select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 11px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 14px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .status {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .asset-groups {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .asset-group {
      min-height: 260px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .asset-group h3 {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 13px 14px;
      background: #f8fafd;
      border-bottom: 1px solid var(--line);
      font-size: 0.95rem;
    }

    .group-count {
      color: var(--muted);
      font-weight: 600;
    }

    .asset-list {
      display: grid;
      align-content: start;
      max-height: 360px;
      overflow: auto;
    }

    .asset-option {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid #edf1f7;
      align-items: start;
    }

    .asset-option:hover { background: var(--accent-soft); }
    .asset-option.selected { background: #fbfdff; }

    .asset-pick {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      min-width: 0;
      cursor: pointer;
    }

    .asset-pick input {
      margin-top: 3px;
    }

    .asset-pick > span {
      min-width: 0;
    }

    .asset-symbol {
      display: block;
      overflow-wrap: anywhere;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .asset-name {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .asset-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      padding-left: 28px;
    }

    .asset-controls label {
      display: grid;
      min-width: 0;
      gap: 4px;
    }

    .asset-controls select {
      display: block;
      width: 100%;
      min-width: 0;
      min-height: 38px;
      padding: 7px 9px;
      font-size: 0.9rem;
      line-height: 1.2;
    }

    .asset-controls select:disabled {
      color: var(--muted);
      background: #f5f7fb;
    }

    .timeframes {
      display: grid;
      grid-template-columns: repeat(9, minmax(84px, 1fr));
      gap: 10px;
    }

    .choice {
      position: relative;
      display: block;
    }

    .choice input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .choice span {
      display: grid;
      min-height: 46px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
    }

    .choice input:checked + span {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #0b57bf;
    }

    .date-grid {
      align-items: start;
    }

    .date-field {
      flex: 1 1 240px;
      min-width: 220px;
    }

    .error {
      min-height: 20px;
      color: var(--danger);
      font-size: 0.9rem;
    }

    .output {
      display: none;
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .output h2 {
      padding: 13px 14px;
      background: #f8fafd;
      border-bottom: 1px solid var(--line);
      font-size: 0.95rem;
    }

    pre {
      margin: 0;
      max-height: 360px;
      overflow: auto;
      padding: 16px;
      background: #101828;
      color: #e5edf8;
      font-size: 0.86rem;
      line-height: 1.45;
    }

    @media (max-width: 880px) {
      main { width: min(100% - 20px, 1120px); padding: 20px 0; }
      header, form { padding-left: 18px; padding-right: 18px; }
      .asset-groups { grid-template-columns: 1fr; }
      .asset-controls { padding-left: 0; }
      .timeframes { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell">
      <header>
        <h1>Trading Asset Analysis</h1>
        <p>Select asset, timeframe, date range, and analysis type.</p>
      </header>

      <form id="analysisForm">
        <fieldset>
          <legend>What assets do you want to analyze?</legend>
          <div class="toolbar">
            <div class="search">
              <input id="assetSearch" type="search" autocomplete="off" placeholder="Search by symbol or name">
            </div>
            <label class="bulk-field">
              <span>Default exchange</span>
              <select id="defaultExchange" disabled>
                <option value="">Loading...</option>
              </select>
            </label>
            <label class="bulk-field">
              <span>Default bias</span>
              <select id="defaultBias">
                <option value="Both">Both</option>
                <option value="Bullish">Bullish</option>
                <option value="Bearish">Bearish</option>
              </select>
            </label>
            <div class="actions">
              <button type="button" id="selectVisible">Select All</button>
              <button type="button" id="clearVisible">Clear All</button>
            </div>
            <div class="status" id="assetStatus">Loading assets...</div>
          </div>
          <div class="error" id="assetError"></div>
          <div class="asset-groups" id="assetGroups"></div>
        </fieldset>

        <fieldset>
          <legend>What timeframe do you want to analyze?</legend>
          <div class="timeframes" id="timeframes"></div>
        </fieldset>

        <fieldset>
          <legend>Analysis window</legend>
          <div class="date-grid">
            <label class="date-field">
              <span class="field-label">Start date</span>
              <input id="startDate" name="startDate" type="date" required>
            </label>
            <label class="date-field">
              <span class="field-label">End date</span>
              <input id="endDate" name="endDate" type="date" required>
            </label>
          </div>
          <div class="error" id="dateError"></div>
        </fieldset>

        <label>
          <span class="field-label">Analysis Type</span>
          <select id="analysisType" name="analysisType" required>
            <option value="Bullish Engulfing">Bullish Engulfing</option>
            <option value="Triple M">Triple M</option>
          </select>
        </label>

        <div class="actions">
          <button class="primary" type="submit">Submit</button>
          <button type="reset">Reset</button>
        </div>

        <section class="output" id="output">
          <h2>Submitted Data</h2>
          <pre id="outputJson"></pre>
        </section>
      </form>
    </section>
  </main>

  <script>
    const CURRENCY_PAIRS_ENDPOINT = new URL(
      "/currency-pairs.json",
      window.location.origin
    ).toString();
    const EXCHANGES_ENDPOINT = new URL(
      "/exchanges.json",
      window.location.origin
    ).toString();
    const WEBHOOK_PROXY_ENDPOINT = new URL(
      "/analysis-webhook",
      window.location.origin
    ).toString();
    const MAJORS = new Set(["EURUSD", "GBPUSD", "USDJPY", "USDCHF", "USDCAD", "AUDUSD", "NZDUSD"]);
    const MAJOR_CURRENCIES = ["EUR", "GBP", "JPY", "CHF", "CAD", "AUD", "NZD"];
    const biasOptions = ["Both", "Bullish", "Bearish"];
    const state = {
      assets: [],
      visible: [],
      selected: new Set(),
      exchanges: [],
      defaultExchange: "",
      defaultBias: "Both",
      assetConfig: {}
    };

    const timeframes = [
      ["1", "1 Minute"], ["5", "5 Minutes"], ["15", "15 Minutes"],
      ["30", "30 Minutes"], ["60", "1 Hour"], ["240", "4 Hours"],
      ["D", "Daily"], ["W", "Weekly"], ["M", "Monthly"]
    ];

    const groups = [
      ["majors", "Majors"],
      ["minors", "Minors"],
      ["exotics", "Exotics"]
    ];

    const qs = (id) => document.getElementById(id);

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function tickerFromSymbol(symbol) {
      return String(symbol || "").split(":").pop().replace(/[^A-Z]/gi, "").toUpperCase();
    }

    function assetKey(asset) {
      return tickerFromSymbol(asset.symbol);
    }

    function classifyAsset(asset) {
      const ticker = assetKey(asset);
      if (MAJORS.has(ticker)) return "majors";
      const base = ticker.slice(0, 3);
      const quote = ticker.slice(3, 6);
      if (MAJOR_CURRENCIES.includes(base) && MAJOR_CURRENCIES.includes(quote)) return "minors";
      return "exotics";
    }

    function labelForAsset(asset) {
      return asset.description || asset.label || asset.symbol;
    }

    function exchangeLabel(exchange) {
      return exchange.desc || exchange.name || exchange.value;
    }

    function getAssetConfig(key) {
      if (!state.assetConfig[key]) {
        state.assetConfig[key] = {
          exchange: state.defaultExchange,
          bias: state.defaultBias
        };
      }

      if (!state.assetConfig[key].exchange) state.assetConfig[key].exchange = state.defaultExchange;
      if (!state.assetConfig[key].bias) state.assetConfig[key].bias = state.defaultBias;
      return state.assetConfig[key];
    }

    function renderExchangeOptions(selectedValue) {
      if (!state.exchanges.length) return '<option value="">No Forex exchanges loaded</option>';
      return state.exchanges.map((exchange) => `
        <option value="${escapeHtml(exchange.value)}" ${exchange.value === selectedValue ? "selected" : ""}>
          ${escapeHtml(exchangeLabel(exchange))}
        </option>
      `).join("");
    }

    function renderBiasOptions(selectedValue) {
      return biasOptions.map((bias) => `
        <option value="${bias}" ${bias === selectedValue ? "selected" : ""}>${bias}</option>
      `).join("");
    }

    function renderDefaultExchange() {
      qs("defaultExchange").innerHTML = renderExchangeOptions(state.defaultExchange);
      qs("defaultExchange").disabled = !state.exchanges.length;
    }

    function renderTimeframes() {
      qs("timeframes").innerHTML = timeframes.map(([value, label], index) => `
        <label class="choice">
          <input type="radio" name="timeframe" value="${value}" ${index === 6 ? "checked" : ""}>
          <span>${label}</span>
        </label>
      `).join("");
    }

    function renderAssets() {
      const term = qs("assetSearch").value.trim().toLowerCase();
      state.visible = state.assets.filter((asset) => {
        const text = `${asset.symbol} ${labelForAsset(asset)}`.toLowerCase();
        return !term || text.includes(term);
      });

      const grouped = Object.fromEntries(groups.map(([key]) => [key, []]));
      state.visible.forEach((asset) => grouped[classifyAsset(asset)].push(asset));

      qs("assetGroups").innerHTML = groups.map(([key, title]) => `
        <section class="asset-group">
          <h3>${title}<span class="group-count">${grouped[key].length}</span></h3>
          <div class="asset-list">
            ${grouped[key].map((asset) => {
              const key = assetKey(asset);
              const selected = state.selected.has(key);
              const config = getAssetConfig(key);
              return `
                <div class="asset-option ${selected ? "selected" : ""}">
                  <label class="asset-pick">
                    <input type="checkbox" value="${escapeHtml(key)}" ${selected ? "checked" : ""}>
                    <span>
                      <span class="asset-symbol">${escapeHtml(key)}</span>
                      <span class="asset-name">${escapeHtml(labelForAsset(asset))}</span>
                    </span>
                  </label>
                  <div class="asset-controls">
                    <label>
                      <span>Exchange</span>
                      <select data-asset-key="${escapeHtml(key)}" data-config-field="exchange" ${selected ? "" : "disabled"}>
                        ${renderExchangeOptions(config.exchange)}
                      </select>
                    </label>
                    <label>
                      <span>Bias</span>
                      <select data-asset-key="${escapeHtml(key)}" data-config-field="bias" ${selected ? "" : "disabled"}>
                        ${renderBiasOptions(config.bias)}
                      </select>
                    </label>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        </section>
      `).join("");

      qs("assetStatus").textContent = `${state.selected.size} selected / ${state.assets.length} loaded`;
    }

    async function loadAssets() {
      try {
        const response = await fetch(CURRENCY_PAIRS_ENDPOINT);
        if (!response.ok) throw new Error(`Local currency pairs request failed: ${response.status}`);
        const payload = await response.json();
        state.assets = (payload.currency_pairs || [])
          .filter((asset) => asset.symbol)
          .sort((a, b) => a.symbol.localeCompare(b.symbol));
        qs("assetError").textContent = "";
        renderAssets();
      } catch (error) {
        qs("assetError").textContent = error.message;
        qs("assetStatus").textContent = "Assets unavailable";
      }
    }

    async function loadExchanges() {
      const response = await fetch(EXCHANGES_ENDPOINT);
      if (!response.ok) throw new Error(`Local exchanges request failed: ${response.status}`);
      const payload = await response.json();
      state.exchanges = (payload.exchanges || [])
        .filter((exchange) => exchange.group === "Forex" && exchange.value)
        .sort((a, b) => exchangeLabel(a).localeCompare(exchangeLabel(b)));

      const preferredExchange = state.exchanges.find((exchange) => exchange.value === "OANDA");
      state.defaultExchange = preferredExchange?.value || state.exchanges[0]?.value || "";
      renderDefaultExchange();
    }

    async function loadFormData() {
      try {
        await loadExchanges();
        await loadAssets();
      } catch (error) {
        qs("assetError").textContent = error.message;
        qs("assetStatus").textContent = "Form data unavailable";
      }
    }

    function validateDates() {
      const startDate = qs("startDate").value;
      const endDate = qs("endDate").value;
      const message = startDate && endDate && startDate > endDate
        ? "Start date must be on or before end date."
        : "";
      qs("dateError").textContent = message;
      return !message;
    }

    qs("assetGroups").addEventListener("change", (event) => {
      if (event.target.type === "checkbox") {
        const key = event.target.value;
        if (event.target.checked) {
          state.selected.add(key);
          getAssetConfig(key);
        } else {
          state.selected.delete(key);
        }
        renderAssets();
        return;
      }

      const configField = event.target.dataset.configField;
      const key = event.target.dataset.assetKey;
      if (!configField || !key) return;

      getAssetConfig(key)[configField] = event.target.value;
      renderAssets();
    });

    qs("assetSearch").addEventListener("input", renderAssets);

    qs("selectVisible").addEventListener("click", () => {
      state.visible.forEach((asset) => {
        const key = assetKey(asset);
        state.selected.add(key);
        getAssetConfig(key);
      });
      renderAssets();
    });

    qs("clearVisible").addEventListener("click", () => {
      state.visible.forEach((asset) => state.selected.delete(assetKey(asset)));
      renderAssets();
    });

    qs("defaultExchange").addEventListener("change", () => {
      state.defaultExchange = qs("defaultExchange").value;
      state.selected.forEach((key) => {
        getAssetConfig(key).exchange = state.defaultExchange;
      });
      renderAssets();
    });

    qs("defaultBias").addEventListener("change", () => {
      state.defaultBias = qs("defaultBias").value;
      state.selected.forEach((key) => {
        getAssetConfig(key).bias = state.defaultBias;
      });
      renderAssets();
    });

    qs("analysisForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      qs("assetError").textContent = state.selected.size ? "" : "Select at least one asset.";
      if (!state.selected.size || !validateDates()) return;

      const timeframeInput = document.querySelector("input[name='timeframe']:checked");
      const selectedAssetKeys = Array.from(state.selected).sort();
      const selectedAssets = Object.fromEntries(selectedAssetKeys.map((key) => {
        const config = getAssetConfig(key);
        return [
          key,
          {
            exchange: config.exchange,
            bias: config.bias
          }
        ];
      }));
      const submitted = {
        assets: selectedAssets,
        timeframe: {
          label: timeframes.find(([value]) => value === timeframeInput.value)[1],
          query_param: timeframeInput.value
        },
        start_date: qs("startDate").value,
        end_date: qs("endDate").value,
        analysis_type: qs("analysisType").value
      };

      qs("output").style.display = "block";
      qs("outputJson").textContent = JSON.stringify({
        ...submitted,
        webhook: { status: "sending" }
      }, null, 2);

      try {
        const webhookResponse = await fetch(WEBHOOK_PROXY_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(submitted)
        });
        const webhookPayload = await webhookResponse.json().catch(() => ({}));
        if (!webhookResponse.ok) {
          throw new Error(webhookPayload.detail || `Webhook request failed: ${webhookResponse.status}`);
        }

        qs("outputJson").textContent = JSON.stringify({
          ...submitted,
          webhook: {
            status: "sent",
            response: webhookPayload
          }
        }, null, 2);
      } catch (error) {
        qs("assetError").textContent = `Webhook send failed: ${error.message}`;
        qs("outputJson").textContent = JSON.stringify({
          ...submitted,
          webhook: {
            status: "failed",
            error: error.message
          }
        }, null, 2);
      }
    });

    qs("analysisForm").addEventListener("reset", () => {
      state.selected.clear();
      state.assetConfig = {};
      state.defaultBias = "Both";
      qs("defaultBias").value = state.defaultBias;
      const preferredExchange = state.exchanges.find((exchange) => exchange.value === "OANDA");
      state.defaultExchange = preferredExchange?.value || state.exchanges[0]?.value || "";
      renderDefaultExchange();
      qs("assetSearch").value = "";
      qs("assetError").textContent = "";
      qs("dateError").textContent = "";
      qs("output").style.display = "none";
      setTimeout(renderAssets, 0);
    });

    qs("startDate").addEventListener("change", validateDates);
    qs("endDate").addEventListener("change", validateDates);

    renderTimeframes();
    loadFormData();
  </script>
</body>
</html>
